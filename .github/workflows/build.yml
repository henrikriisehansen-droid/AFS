name: Build Executables

on:
  push:
    tags:
      - "v*"          # trigger on version tags, e.g. v1.0.0
  workflow_dispatch:  # allow manual runs from the Actions tab

permissions:
  contents: write   # needed to upload release assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos
            artifact_name: AFS-Validator-macOS
          - os: windows-latest
            label: windows
            artifact_name: AFS-Validator-Windows.exe
          - os: ubuntu-latest
            label: linux
            artifact_name: AFS-Validator-Linux

    runs-on: ${{ matrix.os }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python ────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── Linux system deps (Tk + C compiler) ───────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3-tk tk-dev patchelf ccache

      # ── Windows C compiler (already available via MSVC) ───────────────────
      # Nothing extra needed — GitHub's windows-latest runner ships MSVC.

      # ── macOS C compiler ──────────────────────────────────────────────────
      # Xcode CLT already present on macos-latest runners.

      # ── Python deps + Nuitka ──────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install "nuitka[onefile]" imageio

      # ── Build (macOS) ─────────────────────────────────────────────────────
      - name: Build — macOS
        if: matrix.os == 'macos-latest'
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --macos-create-app-bundle \
            --macos-app-name="AFS Validator" \
            --macos-app-icon=icon/icon.ico \
            --enable-plugin=tk-inter \
            --include-data-dir=icon=icon \
            --output-filename=AFS-Validator \
            --output-dir=dist \
            main.py

      # ── Build (Windows) ───────────────────────────────────────────────────
      - name: Build — Windows
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          python -m nuitka ^
            --standalone ^
            --onefile ^
            --windows-console-mode=disable ^
            --windows-icon-from-ico=icon\icon.ico ^
            --enable-plugin=tk-inter ^
            --include-data-dir=icon=icon ^
            --output-filename=AFS-Validator ^
            --output-dir=dist ^
            main.py

      # ── Build (Linux) ─────────────────────────────────────────────────────
      - name: Build — Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --enable-plugin=tk-inter \
            --include-data-dir=icon=icon \
            --output-filename=AFS-Validator \
            --output-dir=dist \
            main.py

      # ── Rename output to platform-specific artifact name ──────────────────
      - name: Rename binary (macOS)
        if: matrix.os == 'macos-latest'
        run: mv dist/AFS-Validator.app "dist/${{ matrix.artifact_name }}.app" || mv dist/AFS-Validator "dist/${{ matrix.artifact_name }}"

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Move-Item dist\AFS-Validator.exe "dist\${{ matrix.artifact_name }}"

      - name: Rename binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: mv dist/AFS-Validator "dist/${{ matrix.artifact_name }}"

      # ── Upload build artifact ─────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}*   # the * catches .app bundles too
          if-no-files-found: error

      # ── Attach to GitHub Release (only on tag push) ───────────────────────
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact_name }}*
