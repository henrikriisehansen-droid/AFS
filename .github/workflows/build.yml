name: Build Executables

on:
  push:
    tags:
      - "v*"          # trigger on version tags, e.g. v1.0.0
  workflow_dispatch:  # allow manual runs from the Actions tab

permissions:
  contents: write   # needed to upload release assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos
            artifact_name: AFS-Validator-macOS
          - os: windows-latest
            label: windows
            artifact_name: AFS-Validator-Windows.exe
          - os: ubuntu-latest
            label: linux
            artifact_name: AFS-Validator-Linux

    runs-on: ${{ matrix.os }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python & uv ───────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # ── Linux system deps (Tk + C compiler) ───────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3-tk tk-dev patchelf ccache

      # ── Python deps ───────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          uv sync

      # ── Build (macOS) ─────────────────────────────────────────────────────
      - name: Build — macOS
        if: matrix.os == 'macos-latest'
        run: |
          uv run pyinstaller --noconfirm --onedir --windowed --argv-emulation \
            --name "AFS-Validator" \
            --icon "icon/icon.icns" \
            --add-data "icon:icon" \
            --collect-all agentmail \
            --collect-all customtkinter \
            main.py

      # ── Build (Windows) ───────────────────────────────────────────────────
      - name: Build — Windows
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          uv run pyinstaller --noconfirm --onefile --windowed ^
            --name "AFS-Validator" ^
            --icon "icon/icon.ico" ^
            --add-data "icon;icon" ^
            --collect-all agentmail ^
            --collect-all customtkinter ^
            main.py

      # ── Build (Linux) ─────────────────────────────────────────────────────
      - name: Build — Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          uv run pyinstaller --noconfirm --onefile \
            --name "AFS-Validator" \
            --add-data "icon:icon" \
            --collect-all agentmail \
            --collect-all customtkinter \
            main.py

      # ── Post-Build Processing ─────────────────────────────────────────────
      - name: Post-Build — macOS
        if: matrix.os == 'macos-latest'
        run: |
          cp config.example.toml dist/config.toml
          chmod +x dist/AFS-Validator.app/Contents/MacOS/AFS-Validator
          cd dist
          zip -ry "${{ matrix.artifact_name }}.zip" AFS-Validator.app AFS-Validator config.toml
          # Clean up everything except the zip
          find . -maxdepth 1 ! -name "${{ matrix.artifact_name }}.zip" ! -name "." -exec rm -rf {} +

      - name: Post-Build — Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item config.example.toml dist/config.toml
          cd dist
          Compress-Archive -Path AFS-Validator.exe, config.toml -DestinationPath "${{ matrix.artifact_name }}.zip"
          # Clean up everything except the zip
          Get-ChildItem -Exclude "${{ matrix.artifact_name }}.zip" | Remove-Item -Recurse -Force

      - name: Post-Build — Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          cp config.example.toml dist/config.toml
          chmod +x dist/AFS-Validator
          cd dist
          zip -rj "${{ matrix.artifact_name }}.zip" AFS-Validator config.toml
          # Clean up everything except the zip
          find . -maxdepth 1 ! -name "${{ matrix.artifact_name }}.zip" ! -name "." -exec rm -rf {} +

      # ── Upload build artifact ─────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.zip
          if-no-files-found: error

      # ── Attach to GitHub Release (only on tag push) ───────────────────────
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact_name }}.zip
